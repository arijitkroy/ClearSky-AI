version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:7860"
    volumes:
      - .:/app
      - backend_db:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/clearsky.db
      - START_SIMULATOR=false
    restart: always

  simulator:
    build:
      context: .
      dockerfile: Dockerfile # Reuse the same python environment
    command: python simulator/simulator.py
    depends_on:
      - backend
    environment:
      - INGEST_URL=http://backend:7860/api/v1/sensors/ingest-batch
      - PYTHONPATH=/app
    volumes:
      - .:/app
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always

volumes:
  backend_db:
